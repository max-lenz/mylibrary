server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/library_int
spring.datasource.username=${DB_USER:library}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.generate_statistics=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,metrics,info,prometheus
management.endpoint.metrics.enabled=true
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.prometheus.metrics.export.enabled=true
management.metrics.enable.hikaricp=true
management.metrics.enable.http.server.requests=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.info.build.enabled=true
management.info.git.enabled=true
management.info.git.mode=simple

logging.level.root=INFO
logging.level.com.mylibrary=INFO
logging.level.org.springframework=INFO
logging.file.name=logs/mylibrary-int.log
logging.file.max-size=10MB
logging.file.max-history=30

spring.retry.max-attempts=3
spring.retry.backoff.delay=200
spring.retry.backoff.multiplier=2.0
spring.retry.backoff.max-delay=2000