server.port=8080
spring.main.banner-mode=console


spring.datasource.url=jdbc:h2:mem:devdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.sql.init.mode=always
spring.sql.init.platform=h2
spring.sql.init.encoding=UTF-8
spring.sql.init.data-locations=classpath:data.sql

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

spring.flyway.enabled=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always
management.health.db.enabled=true
management.health.ssl.enabled=false
management.metrics.enable.jvm=true
management.metrics.enable.hikaricp=true
management.metrics.enable.http.server.requests=true
management.info.env.enabled=true
management.info.build.enabled=true
management.health.diskspace.enabled=true
management.health.diskspace.threshold=10GB
management.health.diskspace.path=logs

logging.level.root=INFO
logging.level.com.mylibrary=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.web=DEBUG

spring.retry.max-attempts=1
spring.retry.backoff.delay=0
spring.retry.backoff.multiplier=1.0
spring.retry.backoff.max-delay=0


