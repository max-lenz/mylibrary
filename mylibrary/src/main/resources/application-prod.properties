server.port=8080

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

spring.sql.init.mode=never

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never
management.endpoints.web.exposure.exclude=env,beans,heapdump
management.info.build.enabled=true
management.info.git.enabled=false
management.info.env.enabled=false

logging.level.root=WARN
logging.level.com.mylibrary=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.error.include-message=never
server.error.include-stacktrace=never

spring.retry.max-attempts=5
spring.retry.backoff.delay=300
spring.retry.backoff.multiplier=2.0
spring.retry.backoff.max-delay=3000
